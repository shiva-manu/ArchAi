name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ArchAi-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ArchAi-server/package-lock.json
      - run: npm ci
      - run: npm test

  client-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ArchAi-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ArchAi-client/package-lock.json
      - run: npm ci
      - run: npm test
